<!DOCTYPE html>
<html>
<head>
    <title>Calculator - (Combined)</title>
      <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="parent">
  
  
  <div id="main" >
    <div id="upper">
     <button id="label">ADIB X CALCU</button>
     <button id="powertxt">POWER</button>
     <button id="powerbulbof"></button>
    </div>
    <input id="display" readonly placeholder="">
    <div id="specialbtns" >
      <button class="power" id="on">ON</button>
      <button class="extrabtn" id="">del</button>
      <button class="extrabtn" id="">AC</button>
    
      
    </div>
    <div id="btns" >
      <button class="button">7</button>
      <button class="button">8</button>
      <button class="button">9</button>
      <button class="opr">÷</button>
    

      <button class="button">4</button>
      <button class="button">5</button>
      <button class="button">6</button>
      <button class="opr">×</button>
    

      <button class="button">1</button>
      <button class="button">2</button>
      <button class="button">3</button>
      <button class="opr">-</button>
  

    <button class="button">0</button>
    <button class="button">.</button>
    <button class="opr">+</button>
    <button class="button">=</button>
    
    </div>
  </div>
</div>
<script type="module"src="script.js"></script>
</body>
</html>
